<!DOCTYPE html>
<html>
    <head> 
        <link rel="stylesheet" href="styles.css">
        <meta charset="utf-8">

        <title> DormMate </title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    </head>
        <header>
            <a href="welcome-page.html"><h2> DormMate </h2></a>
            <nav>
                <ul class="nav_links">
                    <li><a href="#"> Subscriptions </a></li>
                    <li><a href="#"> Learn </a></li>
                    <li><a href="#"> Download </a></li>
                </ul>
            </nav>
            <a class="cta" href="signin.html"><button> Log In </button></a>
        </header>
    <body>
        <div class="auth-container">
        <h1 class="signup-page-title">Sign Up</h1>
        <form class="auth-form">
            <div class="name-row">
                <div class="input-wrapper">
                    <label>Name</label>
                    <input type="text" required>
                    <span class="sub-text">First Name</span>
                </div>
            <div class="input-wrapper">
                <label style="visibility:hidden">Last Name</label> <input type="text" required>
                <span class="sub-text">Last Name</span>
            </div>
        </div>

        <label>GBox Email</label>
        <input type="email" required>

        <label>Student ID Number</label>
        <input type="text" required>
        
        <label>Password</label>
        <input type="password" required>

        <button type="submit" class="submit-btn">Sign Up</button>
        <button type="button" class="google-btn">
            <img src="google_logo.png" alt="Google Logo"> Sign Up with Google
        </button>
        </form>
        </div>
    </body>
</html>
